version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibeuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibepassword}
      POSTGRES_DB: vibedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vibeuser" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibe-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-vibe-test-key}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:-vibepassword}@postgres:5432/litellm
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-changeme}
      # Provider API keys — stored only here, never in vibe-code server
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORE_MODEL_IN_DB: "true"
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4" ]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:4000/health/liveliness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vibe-network

  vibe-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://vibeuser:${POSTGRES_PASSWORD:-vibepassword}@postgres:5432/vibedb
      VIBE_CODE_DATA_DIR: /app/data
      VIBE_CODE_MAX_AGENTS: 4
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-vibe-test-key}
    volumes:
      - vibe_data:/app/data
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/server/src:/app/packages/server/src:ro
      - ./packages/web/src:/app/packages/web/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vibe-network

networks:
  vibe-network:
    driver: bridge

volumes:
  postgres_data:
  vibe_data:
